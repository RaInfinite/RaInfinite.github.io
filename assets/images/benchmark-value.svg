<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Benchmark as value statement</title>
  <desc id="desc">A scoring surface showing which behaviors a benchmark rewards.</desc>
  <rect width="900" height="560" fill="#f5f1e9"/>
  <g transform="translate(130 100)">
    <rect width="640" height="330" rx="18" fill="#fffdf8" stroke="#cfc6b7"/>
    <path d="M58 252 L582 252 M58 190 L582 190 M58 128 L582 128 M58 66 L582 66" stroke="#22221f" stroke-opacity=".12"/>
    <path d="M120 280 L230 198 L338 224 L454 104 L560 142" fill="none" stroke="#74313a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="120" cy="280" r="12" fill="#536f63"/>
    <circle cx="230" cy="198" r="12" fill="#536f63"/>
    <circle cx="338" cy="224" r="12" fill="#536f63"/>
    <circle cx="454" cy="104" r="12" fill="#536f63"/>
    <circle cx="560" cy="142" r="12" fill="#536f63"/>
  </g>
  <g fill="#22221f" opacity=".72" font-family="Georgia, serif" font-size="28">
